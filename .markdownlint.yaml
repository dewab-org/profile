# Markdown linting configuration
# Based on Docusaurus/standard markdown rules

default: true

# Disable specific rules
MD013: false  # Line length (too restrictive for code blocks)
MD024: false  # Multiple headings with same content (allows nested headings)
MD029: false  # Ordered list item prefix
MD033: false  # Inline HTML (needed for some docs)
MD036: false  # Emphasis used instead of strong emphasis

# Specific rule overrides
MD007:
    indent: 2

MD009:
    strict_length: true
    length: 80

MD026:
    punctuation: ".,;:!¡¿"

MD027:
    whitespace: true

MD031:
    blocks: ["-"]

MD034: false  # No bare URLs (allowed for links)

MD038: false  # No spaces inside brackets

MD040: false  # No required code blocks

MD041: false  # First line in file should be a heading

MD045: false  # No required heading style

MD046: false  # No required code block indentation

MD047: false  # No required trailing newline
