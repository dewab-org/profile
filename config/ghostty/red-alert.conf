# ── Red Alert ──
# Standalone Ghostty config for a separate "Red Alert" instance.
# Inherits everything from the base config (relative include), then
# overrides the background to a dark red and bumps transparency.
#
# Launch with:
#   open -n -a Ghostty --args --config-file=/Users/JWV82CE/.config/ghostty/red-alert.conf

config-file = config

# Dark red, more transparent than the base 0.96
background = 5c0000
background-opacity = 0.82
background-blur = 20

# Make it obvious which window this is
window-title-font-family = "FiraCode Nerd Font Mono"
title = "RED ALERT"
