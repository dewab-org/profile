[custom.directory_icon]
command = '''
case "${PWD}" in
  "${HOME}"|"${HOME}"/*) printf '´ü╝' ;;
  *) printf '´äö' ;;
esac
'''
when = true
shell = ["sh"]
style = "bg:surface0 fg:blue"
format = '[ ¯éÁ](fg:overlay0 bg:surface0)[ $output]($style)'

[custom.git_provider]
command = '''
remote_url=$(git remote get-url origin 2>/dev/null || git remote get-url "$(git remote | head -n 1)" 2>/dev/null)
case "${remote_url}" in
  *github.com*) printf '´äô' ;;
  *gitlab.com*) printf '´èû' ;;
  *bitbucket.org*) printf '´à▒' ;;
  *) printf '¯£é' ;;
esac
'''
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"
shell = ["sh"]
style = "bg:surface0 fg:green"
format = '[ ¯éÁ](fg:overlay0 bg:surface0)[ $output]($style)'

[git_branch]
symbol = "´Éİ "
style = "bg:surface0 fg:green"
format = '[ $symbol$branch(:$remote_branch)]($style)'
truncation_length = 32
truncation_symbol = "ÔÇĞ"

[git_commit]
commit_hash_length = 8
only_detached = true
tag_disabled = false
tag_symbol = " ´ÉÆ "
style = "bg:surface0 fg:green"
format = '[ @${hash}${tag}]($style)'

[git_state]
rebase = "rebase"
merge = "merge"
revert = "revert"
cherry_pick = "cherry-pick"
bisect = "bisect"
am = "am"
am_or_rebase = "am/rebase"
style = "bg:surface0 fg:red"
format = '[ $state( $progress_current/$progress_total)]($style)'

[git_status]
style = "bg:surface0 fg:yellow"
format = '[$all_status$ahead_behind]($style)'
conflicted = '[ ~${count}](fg:red bg:surface0)'
ahead = '[ Ôçí${count}](fg:green bg:surface0)'
behind = '[ Ôçú${count}](fg:green bg:surface0)'
diverged = '[ Ôçú${behind_count}Ôçí${ahead_count}](fg:green bg:surface0)'
up_to_date = ""
untracked = '[ ?${count}](fg:blue bg:surface0)'
stashed = '[ *${count}](fg:green bg:surface0)'
modified = '[ !${count}](fg:yellow bg:surface0)'
staged = '[ +${count}](fg:yellow bg:surface0)'
renamed = '[ ┬╗${count}](fg:yellow bg:surface0)'
deleted = '[ Ô£İ${count}](fg:red bg:surface0)'
typechanged = '[ Ôëï${count}](fg:yellow bg:surface0)'

