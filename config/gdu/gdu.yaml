# gdu (gdu-go) configuration.
# gdu reads ~/.config/gdu/gdu.yaml; only the options below are set, so all other
# options fall back to gdu's built-in defaults.

# Show the number of items (files) in each directory by default (TUI 'c' key).
show-item-count: true

# ── Catppuccin Mocha theme ──
style:
    header:
        text-color: '#cdd6f4'        # text
        background-color: '#45475a'  # surface1
        hidden: false
    footer:
        text-color: '#cdd6f4'        # text
        background-color: '#45475a'  # surface1
        number-color: '#a6e3a1'      # green
    selected-row:
        text-color: '#1e1e2e'        # base
        background-color: '#89b4fa'   # blue
    result-row:
        number-color: '#fab387'      # peach (sizes)
        directory-color: '#89b4fa'   # blue (directories)
    progress-modal:
        show-disk-progress-bar: true
    use-old-size-bar: false
